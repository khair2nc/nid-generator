<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NID Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="input-form">
            <h2>NID তথ্য দিন</h2>
            <input type="text" id="inName" placeholder="নাম (বাংলা)">
            <input type="text" id="inFather" placeholder="পিতার নাম">
            <input type="text" id="inMother" placeholder="মাতার নাম">
            <input type="text" id="inDOB" placeholder="জন্ম তারিখ (01 Jan 1990)">
            <input type="text" id="inID" placeholder="NID নম্বর">
            <!-- ছবি আপলোড করার অপশন যোগ করা হলো -->
            <input type="file" id="inPhoto" accept="image/*">
            <button onclick="generateCard()">কার্ড তৈরি করুন</button>
        </div>

        <div id="nid-card" class="hidden">
            <div class="card-header">
                <p>গণপ্রজাতন্ত্রী বাংলাদেশ সরকার</p>
                <span>National ID Card</span>
            </div>
            <div class="card-body">
                <div class="photo-box">
                    <img id="outPhoto" src="#" alt="Photo" style="display:none; width:100%; height:100%;">
                    <span id="photoText">ফটো</span>
                </div>
                <div class="info-box">
                    <p><strong>নাম:</strong> <span id="outName"></span></p>
                    <p><strong>পিতা:</strong> <span id="outFather"></span></p>
                    <p><strong>মাতা:</strong> <span id="outMother"></span></p>
                    <p><strong>Date of Birth:</strong> <span id="outDOB" class="dob-text"></span></p>
                </div>
            </div>
            <div class="card-footer">
                ID NO: <span id="outID"></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
